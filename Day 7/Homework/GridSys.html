<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Styled Table</title>
</head>
<body>

<table style="
    width:80%;
    margin:auto;
    text-align:center;
    border-collapse:separate;
    border-spacing:20px 15px;
">

<thead>
<tr>
<th colspan="3" style="
    background-color: blue;
    color:black;
    font-size:50px;
    padding:25px;
    border-radius:20px;
">
    Header
</th>
</tr>
</thead>

<tbody>
<tr>
<td style="
    background-color: green;
    width:33%;
    height:220px;
    font-size:32px;
    border-radius:40px;
">
    Column 1
</td>

<td style="
    background-color: orange;
    width:33%;
    height:220px;
    font-size:32px;
    border-radius:40px;
">
    Column 2
</td>

<td style="
    background-color: yellow;
    width:33%;
    height:220px;
    font-size:32px;
    border-radius:40px;S
">
    Column 3
</td>
</tr>

<tr>
<td colspan="3" style="
    background-color: blue;
    font-size:28px;
    padding:10px;
    border-radius:8px;
">
    Footer
</td>
</tr>
</tbody>

</table>

</body>
</html>
