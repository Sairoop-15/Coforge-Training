<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Time Table</title>

<style>
    body{
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        margin-top: 20px;
    }

    table{
        border-collapse: seperate;
        width: 800px;
    }

    th, td{
        border: 2px solid gray;
        padding: 10px;
        text-align: center;
    }

    th{
        font-weight: bold;
    }

    .title{
        font-size: 24px;
        padding: 12px;
    }

    .hours{
        font-weight: bold;
        vertical-align: middle;
        width: 100px;
    }

    .lunch{
        font-weight: bold;
    }

    .project{
        vertical-align: middle;
    }
</style>

</head>

<body>

<table>

    <tr>
        <th colspan="6" class="title">Time Table</th>
    </tr>

    <tr>
        <td rowspan="6" class="hours">Hours</td>
        <th>Mon</th>
        <th>Tue</th>
        <th>Wed</th>
        <th>Thu</th>
        <th>Fri</th>
    </tr>

    <tr>
        <td>Science</td>
        <td>Maths</td>
        <td>Science</td>
        <td>Maths</td>
        <td>Arts</td>
    </tr>

    <tr>
        <td>Science</td>
        <td>Maths</td>
        <td>Science</td>
        <td>Maths</td>
        <td>Arts</td>
    </tr>

    <tr>
        <td colspan="5" class="lunch">LUNCH</td>
    </tr>

    <tr>
        <td>Science</td>
        <td>Maths</td>
        <td>Science</td>
        <td>Maths</td>
        <td rowspan="2" class="project">Project</td>
    </tr>

    <tr>
        <td>Science</td>
        <td>Maths</td>
        <td>Science</td>
        <td>Maths</td>
    </tr>

</table>

</body>
</html>
